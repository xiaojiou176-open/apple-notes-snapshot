name: Bug report
description: Report a reproducible repository or runtime bug.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for a reproducible repository or runtime bug.
        If your question is really setup help, launchd troubleshooting, or first-run permissions,
        use the Q&A discussion instead: https://github.com/xiaojiou176/apple-notes-snapshot/discussions/categories/q-a

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one short paragraph.
      placeholder: What broke, and where did you notice it?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide a minimal numbered sequence.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include macOS version, Python version if relevant, and whether launchd, the Web UI, or support routing is involved.
      placeholder: macOS version, Python version, command used, launchd/web details
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or traceback
      description: Remove personal note content, tokens, secrets, and private paths before posting.
      render: shell
    validations:
      required: false
