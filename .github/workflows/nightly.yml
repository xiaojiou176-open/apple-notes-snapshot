name: Nightly Deterministic Audit

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly-audit:
    name: Nightly Deterministic Audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install --upgrade "zizmor==1.22.0"

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.11/scripts/download-actionlint.bash \
            | bash -s -- 1.7.11

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.69.3/contrib/install.sh \
            | sh -s -- -b "${RUNNER_TEMP}/trivy-bin" v0.69.3
          echo "${RUNNER_TEMP}/trivy-bin" >> "${GITHUB_PATH}"

      - name: Rebuild repo-owned environment
        run: ./notesctl rebuild-dev-env

      - name: Run nightly deterministic ladder
        run: |
          ./.runtime-cache/dev/venv/bin/python -m pre_commit run --all-files
          PYTHON_BIN=./.runtime-cache/dev/venv/bin/python scripts/checks/ci_gate.sh
          ACTIONLINT_BIN=./actionlint scripts/checks/actionlint_gate.sh
          ZIZMOR_BIN=zizmor scripts/checks/zizmor_gate.sh
          TRIVY_BIN=trivy scripts/checks/trivy_fs_gate.sh
