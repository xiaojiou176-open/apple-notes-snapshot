name: Actionlint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.11/scripts/download-actionlint.bash \
            | bash -s -- 1.7.11

      - name: Run actionlint
        run: ./actionlint .github/workflows/*.yml
