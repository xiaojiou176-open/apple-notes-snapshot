    <circle cx="1194" cy="526" r="120" fill="#F6E7B8" fill-opacity="0.5"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="44" y="48" width="1192" height="548" rx="34" fill="url(#panel)"/>
  </g>

  <text x="96" y="112" fill="#0F7B73" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0.1em">
