default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        stages:
          - pre-commit

  - repo: local
    hooks:
      - id: docs-link-root-hygiene
        name: docs-link-root-hygiene
        entry: python3 scripts/checks/docs_link_root_hygiene.py
        language: system
        pass_filenames: false
        stages:
          - pre-commit

      - id: legacy-path-scan
        name: legacy-path-scan
        entry: python3 scripts/checks/legacy_path_scan.py
        language: system
        pass_filenames: false
        stages:
          - pre-commit

      - id: public-surface-sensitive-scan
        name: public-surface-sensitive-scan
        entry: python3 scripts/checks/public_surface_sensitive_scan.py
        language: system
        pass_filenames: false
        stages:
          - pre-commit

      - id: ci-gate
        name: ci-gate
        entry: bash scripts/checks/ci_gate.sh
        language: system
        pass_filenames: false
        stages:
          - pre-push
